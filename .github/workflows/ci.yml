name: CI/CD Registry & Build Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Registry & Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Registry Validation Tests
        run: yarn test:registry

      - name: Run Shadcn Registry Build
        run: npx shadcn@latest build

      - name: Run Next.js Site Build
        run: yarn build
