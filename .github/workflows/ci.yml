name: CI/CD Registry & Build Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Registry & Build Site
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://dummy-project.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "dummy-service-key"
      RESEND_API_KEY: "re_dummy_key"
      DODO_PAYMENTS_API_KEY: "dummy-dodo-key"
      DODO_PAYMENTS_RETURN_URL: "https://dummy.url"
      DODO_PAYMENTS_ENVIRONMENT: "test_mode"
      AUTH_SECRET: "dummy-secret-key-that-is-long-enough-32-chars"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Registry Validation Tests
        run: yarn test:registry

      - name: Run Shadcn Registry Build
        run: npx shadcn@latest build

      - name: Run Next.js Site Build
        run: yarn build
